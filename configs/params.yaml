# ============================================================
# Project: Phân tích lỗi sản xuất & Dự đoán lỗi
# Dataset: UCI AI4I 2020 Predictive Maintenance
# ============================================================

seed: 42

paths:
  raw_data: "data/raw/ai4i2020.csv"
  processed_data: "data/processed/ai4i2020_processed.parquet"
  processed_csv: "data/processed/ai4i2020_processed.csv"
  figures: "outputs/figures"
  tables: "outputs/tables"
  models: "outputs/models"
  reports: "outputs/reports"

data:
  target: "Machine failure"
  failure_types:
    - "TWF"   # Tool Wear Failure
    - "HDF"   # Heat Dissipation Failure
    - "PWF"   # Power Failure
    - "OSF"   # Overstrain Failure
    - "RNF"   # Random Failure
  numeric_features:
    - "Air temperature [K]"
    - "Process temperature [K]"
    - "Rotational speed [rpm]"
    - "Torque [Nm]"
    - "Tool wear [min]"
  categorical_features:
    - "Type"
  id_columns:
    - "UDI"
    - "Product ID"

preprocessing:
  test_size: 0.2
  scaler: "standard"           # standard | minmax | robust
  encoding: "onehot"           # onehot | label | ordinal
  handle_outliers: true
  outlier_method: "iqr"        # iqr | zscore
  outlier_threshold: 1.5       # IQR multiplier or z-score threshold

feature_engineering:
  bin_tool_wear: true
  tool_wear_bins: [0, 50, 100, 150, 200, 300]
  tool_wear_labels: ["very_low", "low", "medium", "high", "very_high"]
  create_temp_diff: true       # Air temp - Process temp
  create_power: true           # Torque * Rotational speed
  create_lag_features: true
  lag_windows: [1, 3, 5, 10]
  create_rolling_features: true
  rolling_windows: [5, 10, 20]

mining:
  apriori:
    min_support: 0.002
    min_confidence: 0.2
    min_lift: 1.05
    max_len: 4
    policy:
      rule_mode: "many_to_one"
      min_antecedent_len: 2
      max_consequent_len: 1
      allowed_consequents:
        - "Machine failure"
      exclude_failure_in_antecedents: true
  clustering:
    algorithms: ["kmeans", "dbscan", "hierarchical"]
    feature_subset:
      - "Air temperature [K]"
      - "Process temperature [K]"
      - "Rotational speed [rpm]"
      - "Torque [Nm]"
      - "Tool wear [min]"
      - "temp_diff"
      - "power"
      - "torque_speed_ratio"
      - "wear_torque"
      - "air_temp_x_speed"
      - "proc_temp_x_torque"
    kmeans:
      n_clusters_range: [2, 3, 4, 5, 6, 7, 8]
    dbscan:
      eps_range: [0.3, 0.5, 0.7, 1.0]
      min_samples_range: [3, 5, 10]
    hierarchical:
      n_clusters_range: [2, 3, 4, 5]
      linkage: "ward"           # ward | complete | average

modeling:
  classification:
    models:
      - "logistic_regression"
      - "random_forest"
      - "gradient_boosting"
      - "xgboost"
      - "lightgbm"
    hyperparams:
      logistic_regression:
        C: [0.01, 0.1, 1.0, 10.0]
        max_iter: 1000
        class_weight: "balanced"
      random_forest:
        n_estimators: [100, 200, 300]
        max_depth: [5, 10, 15, null]
        min_samples_split: [2, 5, 10]
        class_weight: "balanced"
      gradient_boosting:
        n_estimators: [100, 200, 300]
        max_depth: [3, 5, 7]
        learning_rate: [0.01, 0.05, 0.1]
      xgboost:
        n_estimators: [100, 200, 300]
        max_depth: [3, 5, 7]
        learning_rate: [0.01, 0.05, 0.1]
        scale_pos_weight: 28.5   # ratio 9661/339
      lightgbm:
        n_estimators: [100, 200, 300]
        max_depth: [3, 5, 7]
        learning_rate: [0.01, 0.05, 0.1]
        is_unbalance: true
    cv_folds: 5
    scoring: "f1"

  regression:
    target: "Tool wear [min]"
    models:
      - "linear_regression"
      - "random_forest_reg"
      - "gradient_boosting_reg"
      - "xgboost_reg"
    hyperparams:
      random_forest_reg:
        n_estimators: [100, 200]
        max_depth: [5, 10, 15]
      gradient_boosting_reg:
        n_estimators: [100, 200]
        max_depth: [3, 5, 7]
        learning_rate: [0.01, 0.05, 0.1]
      xgboost_reg:
        n_estimators: [100, 200]
        max_depth: [3, 5, 7]
        learning_rate: [0.01, 0.05, 0.1]

  time_series:
    uid_as_time_index: true    
    target: "Tool wear [min]"
    train_ratio: 0.8
    arima_order: [2, 1, 2]
    seasonal_order: null

semi_supervised:
  label_percentages: [0.05, 0.10, 0.20]
  decision_threshold: 0.35
  methods:
    - "self_training"
    - "label_spreading"
  self_training:
    threshold: 0.9
    criterion: "k_best"
    k_best: 300
    max_iter: 30
  label_spreading:
    kernel: "rbf"
    alpha: 0.2
    max_iter: 100

evaluation:
  classification_metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"
    - "pr_auc"
  regression_metrics:
    - "mae"
    - "rmse"
    - "r2"
    - "mape"
  clustering_metrics:
    - "silhouette"
    - "davies_bouldin"
    - "calinski_harabasz"
